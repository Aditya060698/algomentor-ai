services:
  - type: web
    name: algomentor-ai-backend
    runtime: docker
    rootDir: backend
    plan: free
    autoDeploy: true
    healthCheckPath: /api/v1/health
    envVars:
      - key: PORT
        value: 10000
      - key: SPRING_PROFILES_ACTIVE
        value: prod
      - key: DB_HOST
        fromDatabase:
          name: algomentor-ai-postgres
          property: host
      - key: DB_PORT
        fromDatabase:
          name: algomentor-ai-postgres
          property: port
      - key: DB_NAME
        fromDatabase:
          name: algomentor-ai-postgres
          property: database
      - key: DB_USERNAME
        fromDatabase:
          name: algomentor-ai-postgres
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: algomentor-ai-postgres
          property: password
      - key: APP_CORS_ALLOWED_ORIGINS
        sync: false

  - type: web
    name: algomentor-ai-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    pullRequestPreviewsEnabled: true
    envVars:
      - key: VITE_API_BASE_URL
        sync: false
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

databases:
  - name: algomentor-ai-postgres
    plan: free
